                id: "day10", date: "08/01 (四)", title: "DAY 10 太空總署終極解密", tag: "景點", tagColor: "bg-emerald-500",
                events: [
                    { time: "全天", type: "景點", name: "Kennedy Space Center", desc: "造訪 NASA 基地，近距離朝聖亞特蘭提斯號太空梭與土星五號火箭！", url: "" }
                ]
            },
            {
                id: "day11", date: "08/02 (五)", title: "DAY 11 滿載回憶 經 SFO 返台", tag: "歸途", tagColor: "bg-gray-500",
                events: [
                    { time: "10:00", type: "交通", name: "聯合航空 UA2017", desc: "奧蘭多機場 (MCO) ➔ 舊金山機場 (SFO)，12:44 抵達。", url: "" },
                    { time: "14:40", type: "交通", name: "聯合航空 UA871", desc: "舊金山 (SFO) ➔ 台灣桃園國際機場 (TPE)，預計隔日 18:45 抵達。", url: "" }
                ]
            }
        ];

        // ------------------ Firebase 資料同步監聽 ------------------
        function initFirebaseSync() {
            database.ref('itinerary').on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    database.ref('itinerary').set(defaultItinerary);
                    itineraryData = defaultItinerary;
                } else {
                    itineraryData = data;
                }
                renderItinerary();
            });

            database.ref('ledger').on('value', (snapshot) => {
                const data = snapshot.val();
                ledgerData = data ? Object.values(data) : [];
                if (document.getElementById('ledger-modal').classList.contains('hidden') === false) {
                    calculateFinances();
                }
            });
        }

        // 行程畫面動態渲染
        function renderItinerary() {
            const container = document.getElementById('itinerary-container'); 
            container.innerHTML = '';
            
            itineraryData.forEach((day, dayIdx) => {
                const daySection = document.createElement('section');
                daySection.id = day.id;
                daySection.className = "graffiti-bg bg-snowWhite rounded-3xl p-5 shadow-md border border-gray-200/60";
                let eventsHtml = '';
                
                if (day.events) {
                    day.events.forEach((ev, evIdx) => {
                        const iconClass = typeIcons[ev.type] || "fa-location-dot";
                        const colorClass = typeColors[ev.type] || "bg-gray-100 text-gray-500";
                        
                        eventsHtml += `
                            <div class="flex gap-3 group relative">
                                <div class="flex flex-col items-center">
                                    <div class="w-8 h-8 rounded-full ${colorClass} flex items-center justify-center text-xs shadow-xs"><i class="fa-solid ${iconClass}"></i></div>
                                </div>
                                <div class="flex-1 bg-white p-3 rounded-2xl shadow-xs border border-gray-100 relative group">
                                    <button onclick="openEditModal(${dayIdx}, ${evIdx})" class="absolute top-2 right-2 text-[11px] font-bold text-fujiBlue bg-blue-50 border border-blue-200 hover:bg-fujiBlue hover:text-white px-2 py-0.5 rounded-lg opacity-80 group-hover:opacity-100 transition shadow-xs">
                                        <i class="fa-solid fa-pen mr-0.5"></i> 編輯
                                    </button>
                                    
                                    <div class="flex justify-between items-center pr-12">
                                        <span class="text-[10px] font-bold bg-gray-50 text-gray-600 px-2 py-0.5 rounded">${ev.type}</span>
                                        <span class="text-[10px] font-mono text-gray-400">${ev.time || ''}</span>
                                    </div>
                                    <h4 class="font-bold mt-1 text-sm text-gray-900">${ev.name}</h4>
                                    <p class="text-xs text-gray-500 mt-1 whitespace-pre-line leading-relaxed">${ev.desc || ''}</p>
                                    ${ev.url ? `<a href="${ev.url}" target="_blank" class="inline-block text-[11px] text-fujiBlue font-bold mt-2 hover:underline"><i class="fa-solid fa-link mr-1"></i>官方網站連結</a>` : ''}
                                </div>
                            </div>`;
                    });
                }
                
                // 在標題右側注入「➕ 新增行程」按鈕
                daySection.innerHTML = `
                    <div class="flex justify-between items-center border-b border-gray-200 pb-3 mb-4">
                        <div>
                            <span class="text-xs font-bold text-fujiBlue tracking-wider">${day.date}</span>
                            <h2 class="text-xl font-black text-gray-900">${day.title}</h2>
                        </div>
                        <div class="flex flex-col items-end gap-1.5">
                            <span class="${day.tagColor} text-white text-[10px] px-2 py-0.5 rounded-full font-black">${day.tag}</span>
                            <button onclick="openAddModal(${dayIdx})" class="bg-emerald-500 hover:bg-emerald-600 text-white text-[11px] font-black px-2.5 py-1 rounded-xl shadow-xs transition active:scale-95">
                                <i class="fa-solid fa-plus mr-0.5"></i> 新增行程
                            </button>
                        </div>
                    </div>
                    <div class="space-y-4">${eventsHtml}</div>`;
                container.appendChild(daySection);
            });
        }

        // 開啟【編輯】行程視窗
        function openEditModal(dayIdx, evIdx) {
            const ev = itineraryData[dayIdx].events[evIdx];
            document.getElementById('modal-title').innerText = "編輯行程項目";
            document.getElementById('edit-day-idx').value = dayIdx;
            document.getElementById('edit-event-idx').value = evIdx;
            document.getElementById('edit-time').value = ev.time || '';
            document.getElementById('edit-type').value = ev.type;
            document.getElementById('edit-name').value = ev.name;
            document.getElementById('edit-desc').value = ev.desc || '';
            document.getElementById('edit-url').value = ev.url || '';
            document.getElementById('edit-event-modal').classList.remove('hidden');
        }

        // 開啟【新增】行程視窗
        function openAddModal(dayIdx) {
            document.getElementById('modal-title').innerText = `新增行程到 ${itineraryData[dayIdx].title}`;
            document.getElementById('edit-day-idx').value = dayIdx;
            document.getElementById('edit-event-idx').value = "-1"; // 用 -1 標記為全新項目
            document.getElementById('edit-time').value = '';
            document.getElementById('edit-type').value = '景點';
            document.getElementById('edit-name').value = '';
            document.getElementById('edit-desc').value = '';
            document.getElementById('edit-url').value = '';
            document.getElementById('edit-event-modal').classList.remove('hidden');
        }

        function closeEditModal() {
            document.getElementById('edit-event-modal').classList.add('hidden');
        }

        // 儲存變更（包含新增或修改）至 Firebase
        function saveEventChanges() {
            const dayIdx = parseInt(document.getElementById('edit-day-idx').value);
            const evIdx = parseInt(document.getElementById('edit-event-idx').value);
            
            const newEvent = {
                time: document.getElementById('edit-time').value.trim(),
                type: document.getElementById('edit-type').value,
                name: document.getElementById('edit-name').value.trim() || "未命名項目",
                desc: document.getElementById('edit-desc').value.trim(),
                url: document.getElementById('edit-url').value.trim()
            };

            if (!itineraryData[dayIdx].events) {
                itineraryData[dayIdx].events = [];
            }

            if (evIdx === -1) {
                // 新增模式：直接推入該天陣列中
                itineraryData[dayIdx].events.push(newEvent);
            } else {
                // 編輯模式：替換原本索引的內容
                itineraryData[dayIdx].events[evIdx] = newEvent;
            }

            // 更新到 Firebase
            database.ref('itinerary').set(itineraryData);
            closeEditModal();
        }

        // ------------------ 智慧分帳記帳系統 ------------------
        function openLedgerModal() {
            document.getElementById('ledger-modal').classList.remove('hidden');
            document.getElementById('ledger-rate-display').innerText = `目前匯率: ${currentUsdRate.toFixed(2)}`;
            calculateFinances();
        }

        function closeLedgerModal() {
            document.getElementById('ledger-modal').classList.add('hidden');
        }

        function addExpenseRecord() {
            const itemInput = document.getElementById('expense-item');
            const amountInput = document.getElementById('expense-amount');
            const payerSelect = document.getElementById('expense-payer');

            const item = itemInput.value.trim();
            const usdAmount = parseFloat(amountInput.value);

            if(!item || isNaN(usdAmount) || usdAmount <= 0) {
                alert("請正確填寫品項名稱與金額！"); return;
            }

            let selectedSharers = [];
            members.forEach(name => {
                if(document.getElementById(`share-${name}`).checked) selectedSharers.push(name);
            });

            if(selectedSharers.length === 0) {
                alert("這筆錢至少要勾選一個人來分攤負責喔！"); return;
            }

            const totalTwd = Math.round(usdAmount * currentUsdRate);
            const recordId = Date.now().toString();
            
            const record = {
                id: recordId, item: item, usd: usdAmount, twd: totalTwd,
                payer: payerSelect.value, sharers: selectedSharers,
                rate: currentUsdRate, timeStr: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            };

            database.ref('ledger/' + recordId).set(record);

            itemInput.value = ''; amountInput.value = '';
            members.forEach(name => document.getElementById(`share-${name}`).checked = true);
        }

        function deleteExpense(id) {
            database.ref('ledger/' + id).remove();
        }

        function getSettleMatrix() {
            let totalPaid = { TIM: 0, MONICA: 0, JOJO: 0, ANDY: 0 };
            let totalOwe = { TIM: 0, MONICA: 0, JOJO: 0, ANDY: 0 };

            ledgerData.forEach(rec => {
                totalPaid[rec.payer] += rec.twd;
                const sharerCount = rec.sharers ? rec.sharers.length : 0;
                if(sharerCount > 0) {
                    const perSharerTwd = rec.twd / sharerCount;
                    rec.sharers.forEach(sharer => { totalOwe[sharer] += perSharerTwd; });
                }
            });

            let balances = members.map(name => ({
                name: name,
                bal: totalPaid[name] - Math.round(totalOwe[name])
            }));

            let creditors = balances.filter(b => b.bal > 0).sort((a,b) => b.bal - a.bal);
            let debtors = balances.filter(b => b.bal < 0).sort((a,b) => a.bal - b.bal);

            let instructions = [];
            let dIdx = 0, cIdx = 0;

            while(dIdx < debtors.length && cIdx < creditors.length) {
                let debtor = debtors[dIdx];
                let creditor = creditors[cIdx];
                let amount = Math.min(Math.abs(debtor.bal), creditor.bal);

                if(amount > 0.5) {
                    instructions.push({ from: debtor.name, to: creditor.name, amount: Math.round(amount) });
                }

                debtor.bal += amount;
                creditor.bal -= amount;

                if(Math.abs(debtor.bal) < 1) dIdx++;
                if(creditor.bal < 1) cIdx++;
            }
            return instructions;
        }

        function calculateFinances() {
            const transferContainer = document.getElementById('direct-transfer-list');
            transferContainer.innerHTML = '';

            if(ledgerData.length === 0) {
                transferContainer.innerHTML = `<p class="text-indigo-200 text-center py-4 text-xs italic">暫無記帳數據，快在上方新增第一筆消費吧！</p>`;
            } else {
                const routes = getSettleMatrix();
                if(routes.length === 0) {
                    transferContainer.innerHTML = `
                        <div class="bg-emerald-500/20 border border-emerald-500/40 rounded-xl p-3 text-center text-xs text-emerald-300 font-bold">
                            🎉 目前大家代墊金額完美打平，全部兩清！
                        </div>`;
                } else {
                    routes.forEach(route => {
                        const row = document.createElement('div');
                        row.className = "flex items-center justify-between bg-white/10 border border-white/10 rounded-xl p-2.5 text-xs tracking-wide";
                        row.innerHTML = `
                            <div class="flex items-center gap-1.5">
                                <span class="bg-red-500 text-white font-black px-2 py-0.5 rounded-md shadow-xs">${route.from}</span>
                                <span class="text-indigo-300"><i class="fa-solid fa-arrow-right-long"></i> 轉帳給</span>
                                <span class="bg-emerald-500 text-white font-black px-2 py-0.5 rounded-md shadow-xs">${route.to}</span>
                            </div>
                            <div class="text-right">
                                <span class="font-mono font-black text-yellow-300 text-sm">$${route.amount.toLocaleString('zh-TW')}</span> <span class="text-[10px] text-indigo-200">元</span>
                            </div>`;
                        transferContainer.appendChild(row);
                    });
                }
            }

            const listContainer = document.getElementById('ledger-history-list');
            listContainer.innerHTML = '';
            if(ledgerData.length === 0) {
                listContainer.innerHTML = `<p class="text-gray-400 text-center py-4 text-xs">目前暫無任何記帳資料。</p>`;
                return;
            }

            [...ledgerData].reverse().forEach(rec => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center bg-white p-2 rounded-xl border border-gray-100 shadow-2xs";
                const sharersTag = rec.sharers ? ((rec.sharers.length === 4) ? '全員' : rec.sharers.join(',')) : '無';
                div.innerHTML = `
                    <div class="flex-1 pr-2">
                        <p class="font-bold text-gray-800 text-[12px]">${rec.item} <span class="text-[10px] font-mono text-gray-400">($${rec.usd} USD)</span></p>
                        <p class="text-[10px] text-gray-400">${rec.timeStr || ''} · <span class="font-bold text-amber-600">${rec.payer}</span> 墊 · 分攤: <span class="bg-stone-100 px-1 text-stone-600 font-bold rounded">${sharersTag}</span></p>
                    </div>
                    <div class="flex items-center gap-1">
                        <span class="font-mono font-bold text-gray-900">$${rec.twd}</span>
                        <button onclick="deleteExpense('${rec.id}')" class="text-gray-300 hover:text-red-500 p-1"><i class="fa-solid fa-trash-can"></i></button>
                    </div>`;
                listContainer.appendChild(div);
            });
        }

        function copySplitToLine() {
            if(ledgerData.length === 0) {
                alert("目前沒有帳目可以複製喔！"); return;
            }
            let text = `🇺🇸 【紐約 & 佛州 MINI TOUR】旅費最終轉帳清算報告\n`;
            text += `=========================\n`;
            const routes = getSettleMatrix();
            if(routes.length === 0) {
                text += `✅ 經過精算，大家代墊費用已完全兩清，不需互轉！\n`;
            } else {
                text += `📢 【請依照以下指引直接完成轉帳】\n\n`;
                routes.forEach(route => {
                    text += ` 💵 🟥 ${route.from} ➡️ 轉給 🟩 ${route.to}： NT$ ${route.amount.toLocaleString('zh-TW')} 元\n`;
                });
            }
            text += `=========================\n`;
            text += `帳目已依每筆消費實際「自訂分攤名單」計算完畢！請大家抽空匯款並在群組回覆唷，感恩！ ❤️`;

            navigator.clipboard.writeText(text).then(() => {
                alert("🟢 轉帳報告已成功複製！快去貼到 LINE 群組催款吧！");
            }).catch(() => { alert("複製失敗，請手動複製。"); });
        }

        async function fetchExchangeRate() {
            const rateText = document.getElementById('current-rate');
            try {
                const response = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await response.json(); const rate = data.rates.TWD;
                if (rate) { currentUsdRate = rate; rateText.innerText = rate.toFixed(2); }
            } catch (error) { currentUsdRate = 32.00; rateText.innerText = "32.00"; }
        }

        window.addEventListener('DOMContentLoaded', () => {
            initFirebaseSync();
            fetchExchangeRate();
        });
    </script>
